# yaml-language-server: $schema=https://render.com/schema/render.yaml.json

services:
  - type: web
    name: kakao-assignment-3-api
    runtime: python
    plan: free
    region: singapore
    branch: main
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kakao-assignment-3-db
          property: connectionString

databases:
  - name: kakao-assignment-3-db
    plan: free
    region: singapore
    postgresMajorVersion: "17"
    databaseName: todo_app
    user: todo_user
    ipAllowList: []
